<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat Bot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #343541;
    color: white;
}

#chat {
    height: 90vh;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    margin: 10px 0;
}

.user {
    text-align: right;
    color: #4cafef;
}

.bot {
    text-align: left;
}

#inputBox {
    display: flex;
    padding: 10px;
    background: #202123;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
}

button {
    padding: 10px;
    background: #19c37d;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="Жаз...">
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    let input = document.getElementById("input");
    let text = input.value;

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: text})
    });

    let data = await res.json();
    addMessage(data.response, "bot");
}

function addMessage(text, type) {
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
